<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlanToPlate</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js'></script>
    <style>
        body { background-color: #f8f9fa; padding-bottom: 50px; }
        .fc-event { cursor: pointer; border: none; margin-bottom: 2px; } /* Spacing for stacked meals */
        .recipe-item { transition: all 0.2s; }
        .recipe-item.d-none { display: none !important; }
        .form-check-input:checked + span { text-decoration: line-through; color: #6c757d; }

        #recipeList { 
            max-height: 400px; 
            overflow-y: auto; 
        }
    </style>
</head>
<body>

<nav class="navbar navbar-light bg-white shadow-sm mb-4">
    <div class="container-fluid">
        <span class="navbar-brand mb-0 h1 fw-bold">
            <img src="icon.jpg" width="30" height="30" class="d-inline-block align-text-top me-2 rounded">
            PlanToPlate
        </span>
        <button class="btn btn-success" onclick="generateShoppingList()" data-bs-toggle="modal" data-bs-target="#shoppingModal">
            🛒 Grocery List
        </button>
    </div>
</nav>

<div class="container-fluid px-4">
    <div class="row">
        <div class="col-md-4">
            <div class="card shadow-sm mb-3">
                <div class="card-header bg-primary text-white fw-bold">Add New Recipe</div>
                <div class="card-body">
                    <input type="text" id="recipeName" class="form-control mb-2 fw-bold" placeholder="Recipe Name">
                    <label class="form-label text-muted small mb-0">Ingredients (One per line)</label>
                    <textarea id="recipeIngredients" class="form-control mb-2" rows="4" placeholder="1 cup Rice..."></textarea>
                    <label class="form-label text-muted small mb-0">Instructions</label>
                    <textarea id="recipeInstructions" class="form-control mb-2" rows="4" placeholder="Step 1..."></textarea>
                    <button class="btn btn-primary w-100" onclick="addRecipe()">Save to Cookbook</button>
                </div>
            </div>
            
            <div class="d-flex justify-content-between align-items-center mt-4 mb-2">
                <h6 class="text-muted mb-0">My Cookbook</h6>
                <input type="text" id="recipeSearch" class="form-control form-control-sm w-50" placeholder="🔍 Search..." onkeyup="filterRecipes()">
            </div>
            <div id="recipeList" class="list-group mb-4 shadow-sm"></div>
        </div>

        <div class="col-md-8">
            <div class="card shadow-sm">
                <div class="card-body p-2">
                    <div id="calendar"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="shoppingModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-success text-white">
                <h5 class="modal-title">🛒 Shopping List</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="d-flex gap-2 align-items-end mb-3">
                    <div class="flex-grow-1">
                        <label class="small text-muted mb-1">Select Week:</label>
                        <select id="weekSelector" class="form-select" onchange="renderSelectedWeek()">
                            <option selected disabled>Loading...</option>
                        </select>
                    </div>
                    <button class="btn btn-outline-success" onclick="copyListToClipboard()" title="Copy to Clipboard">📋 Copy</button>
                </div>

                <ul id="shoppingListItems" class="list-group list-group-flush"></ul>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="eventOptionsModal" tabindex="-1">
    <div class="modal-dialog modal-sm">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="eventOptionsTitle">Meal Options</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body d-grid gap-2">
                <button class="btn btn-primary" onclick="openRecipeFromEvent()">📖 Open Recipe Card</button>
                <button class="btn btn-outline-danger" onclick="deleteCurrentEvent()">🗑 Remove from Schedule</button>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="recipeModal" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
        <div class="modal-content">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title" id="modalRecipeTitle">Cooking View</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="row">
                    <div class="col-md-5 border-end">
                        <h6 class="text-uppercase text-muted fw-bold mb-3">Ingredients</h6>
                        <ul id="modalIngredients" class="list-group list-group-flush small"></ul>
                    </div>
                    <div class="col-md-7">
                        <h6 class="text-uppercase text-muted fw-bold mb-3">Instructions</h6>
                        <div id="modalInstructions" class="p-2" style="white-space: pre-wrap; line-height: 1.6;"></div>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close Kitchen</button>
            </div>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="app.js"></script>
</body>
</html>
